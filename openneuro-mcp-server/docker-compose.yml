services:
  openneuro-mcp:
    build: .
    environment:
      OPENNEURO_GRAPHQL_URL: https://openneuro.org/crn/graphql
      OPENNEURO_TIMEOUT: "30"
    depends_on:
      - postgres
      - qdrant
      - neo4j

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: openneuro_mcp
      POSTGRES_USER: openneuro
      POSTGRES_PASSWORD: openneuro
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:v1.11.4
    ports:
      - "6333:6333"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/openneuro-mcp
    ports:
      - "7474:7474"
      - "7687:7687"
